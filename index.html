<title>PROTEIN CALC 80s</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --neon-purple: #bf5fff;
    --dark-bg: #0a0010;
    --dark-card: #12001e;
    --grid-color: rgba(0,245,255,0.08);
    --scanline: rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark-bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanline effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* grid floor */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 50vh;
    background:
      linear-gradient(rgba(0,245,255,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    transform: perspective(400px) rotateX(60deg);
    transform-origin: bottom center;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .title-glow {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4vw, 28px);
    color: var(--neon-pink);
    text-shadow:
      0 0 10px var(--neon-pink),
      0 0 30px var(--neon-pink),
      0 0 60px var(--neon-pink);
    letter-spacing: 4px;
    animation: flicker 4s infinite;
    line-height: 1.6;
  }

  .subtitle {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--neon-yellow);
    letter-spacing: 6px;
    text-shadow: 0 0 10px var(--neon-yellow);
    margin-top: 8px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 1; }
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 10px var(--neon-yellow); }
    50% { text-shadow: 0 0 25px var(--neon-yellow), 0 0 50px var(--neon-yellow); }
  }

  /* LANG SWITCHER */
  .lang-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid var(--neon-purple);
    color: var(--neon-purple);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 4px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
  }
  .lang-btn:hover, .lang-btn.active {
    background: var(--neon-purple);
    color: var(--dark-bg);
    box-shadow: 0 0 15px var(--neon-purple);
  }

  /* FOOD EMOJIS MARQUEE */
  .food-marquee {
    overflow: hidden;
    border-top: 2px solid var(--neon-cyan);
    border-bottom: 2px solid var(--neon-cyan);
    padding: 6px 0;
    margin: 14px 0;
    box-shadow: 0 0 10px var(--neon-cyan);
  }
  .marquee-inner {
    display: flex;
    animation: marquee 20s linear infinite;
    white-space: nowrap;
  }
  .marquee-item {
    font-size: 28px;
    margin: 0 16px;
    filter: drop-shadow(0 0 8px var(--neon-green));
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* CARD */
  .card {
    background: var(--dark-card);
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 30px rgba(0,0,0,0.5);
    padding: 24px;
    margin: 16px 0;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -2px; left: 20px;
    right: 20px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
  }

  .section-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--neon-yellow);
    letter-spacing: 3px;
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(255,230,0,0.3);
    padding-bottom: 8px;
  }

  /* FORM ELEMENTS */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 18px;
    color: var(--neon-cyan);
    letter-spacing: 2px;
  }

  input[type="number"], select {
    background: #000;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-green);
    font-family: 'VT323', monospace;
    font-size: 22px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"]:focus, select:focus {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px var(--neon-pink);
    color: var(--neon-pink);
  }
  select option { background: #0a0010; color: var(--neon-green); }

  /* RADIO GROUPS */
  .radio-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .radio-label {
    cursor: pointer;
    border: 2px solid var(--neon-purple);
    padding: 6px 14px;
    font-size: 18px;
    color: var(--neon-purple);
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .radio-label input { display: none; }
  .radio-label.selected, .radio-label:hover {
    background: var(--neon-purple);
    color: #000;
    box-shadow: 0 0 12px var(--neon-purple);
  }

  /* CALCULATE BUTTON */
  .calc-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 3px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2vw, 14px);
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    text-shadow: 0 0 10px var(--neon-pink);
    box-shadow: 0 0 20px rgba(255,45,120,0.3);
    position: relative;
    overflow: hidden;
  }
  .calc-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,45,120,0.3), transparent);
    transition: left 0.4s;
  }
  .calc-btn:hover::before { left: 100%; }
  .calc-btn:hover {
    background: var(--neon-pink);
    color: #000;
    box-shadow: 0 0 40px var(--neon-pink), 0 0 80px rgba(255,45,120,0.5);
  }
  .calc-btn:active { transform: scale(0.98); }

  /* RESULTS */
  .result-box {
    display: none;
    margin-top: 16px;
  }
  .result-box.show { display: block; }

  .result-main {
    text-align: center;
    padding: 20px;
    border: 2px solid var(--neon-green);
    box-shadow: 0 0 30px rgba(57,255,20,0.4);
    background: rgba(57,255,20,0.05);
    margin-bottom: 16px;
    animation: resultIn 0.5s ease-out;
  }
  @keyframes resultIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-number {
    font-family: 'Orbitron', monospace;
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 900;
    color: var(--neon-green);
    text-shadow: 0 0 20px var(--neon-green), 0 0 50px var(--neon-green);
    line-height: 1;
  }
  .result-unit {
    font-size: 24px;
    color: var(--neon-yellow);
    letter-spacing: 4px;
  }
  .result-label {
    font-size: 20px;
    color: #aaa;
    margin-top: 8px;
  }

  /* BREAKDOWN TABLE */
  .breakdown {
    border: 1px solid rgba(0,245,255,0.3);
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0,245,255,0.1);
    font-size: 20px;
    transition: background 0.2s;
  }
  .breakdown-row:hover { background: rgba(0,245,255,0.05); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-emoji { font-size: 24px; margin-right: 8px; }
  .breakdown-food { color: var(--neon-cyan); }
  .breakdown-val { color: var(--neon-yellow); font-family: 'Orbitron', monospace; font-size: 18px; }
  .breakdown-bar-wrap { flex: 1; margin: 0 16px; height: 8px; background: rgba(255,255,255,0.1); }
  .breakdown-bar { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); transition: width 1s ease; box-shadow: 0 0 6px var(--neon-cyan); }

  /* TIP BOX */
  .tip-box {
    border: 1px dashed var(--neon-yellow);
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 20px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    letter-spacing: 1px;
    line-height: 1.5;
  }
  .tip-box span { color: var(--neon-pink); }

  /* FOOD REFERENCE */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .food-card {
    border: 1px solid rgba(191,95,255,0.4);
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(191,95,255,0.05);
  }
  .food-card:hover {
    border-color: var(--neon-purple);
    box-shadow: 0 0 15px var(--neon-purple);
    transform: translateY(-2px);
  }
  .food-card-emoji { font-size: 32px; display: block; }
  .food-card-name { font-size: 16px; color: var(--neon-cyan); margin-top: 4px; }
  .food-card-prot { font-size: 20px; color: var(--neon-green); font-family: 'Orbitron'; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: var(--neon-pink); }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 16px;
    color: rgba(0,245,255,0.4);
    padding: 20px;
    letter-spacing: 3px;
    border-top: 1px solid rgba(0,245,255,0.1);
    margin-top: 20px;
  }

  /* blinking cursor */
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* pixel corner decorations */
  .card-corner {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--neon-pink);
  }
  .card-corner.tl { top: -2px; left: -2px; }
  .card-corner.tr { top: -2px; right: -2px; }
  .card-corner.bl { bottom: -2px; left: -2px; }
  .card-corner.br { bottom: -2px; right: -2px; }
</style>
</head>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title-glow" id="main-title">⚡ PROTEIN CALC ⚡</div>
    <div class="subtitle" id="main-sub">◆ XTRON-7 MUSCLE EDITION ◆</div>
  </div>

  <!-- LANG BAR -->
  <div class="lang-bar">

  <!-- MARQUEE -->
  <div class="food-marquee">

      <span class="marquee-item">🫀</span><span class="marquee-item">🍣</span><span class="marquee-item">🥩</span>

    <button class="calc-btn" onclick="calculate()" id="calc-btn-text">

  <!-- RESULT -->

      <div class="card-corner bl"></div><div class="card-corner br"></div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;text-align:center">

      <div class="section-label" id="lbl-sources">▶ FOOD SOURCES</div>

  <!-- FOOD REFERENCE -->

  </div>

  <div class="footer">PROTEIN CALC v.XTRON-7 ◆ <span class="blink">■</span> ALL SYSTEMS OPERATIONAL</div>
</div>

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyTranslations();
  renderFoodGrid();
}

function applyTranslations() {
  const t = T[currentLang];
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('main-title', t.mainTitle);
  set('main-sub', t.mainSub);
  set('lbl-input', t.lblInput);
  set('lbl-weight', t.lblWeight);
  set('lbl-unit', t.lblUnit);
  set('lbl-age', t.lblAge);
  set('lbl-goal', t.lblGoal);
  set('lbl-gender', t.lblGender);
  set('lbl-activity', t.lblActivity);
  set('lbl-result', t.lblResult);
  set('lbl-per-meal', t.lblPerMeal);
  set('lbl-per-kg', t.lblPerKg);
  set('lbl-calories', t.lblCalories);
  set('lbl-sources', t.lblSources);
  set('lbl-ref', t.lblRef);
  set('res-label', t.resLabel);
  set('res-unit-label', t.resUnitLabel);
  document.getElementById('calc-btn-text').innerHTML = `${t.calcBtn} <span class="blink">█</span>`;
  set('opt-maintain', t.optMaintain);
  set('opt-build', t.optBuild);
  set('opt-lose', t.optLose);
  set('opt-athlete', t.optAthlete);
  set('r-male-text', t.rMale);
  set('r-female-text', t.rFemale);
  set('r-other-text', t.rOther);
  document.querySelector('#r-sed span').textContent = t.rSed;
  document.querySelector('#r-light span').textContent = t.rLight;
  document.querySelector('#r-mod span').textContent = t.rMod;
  document.querySelector('#r-hard span').textContent = t.rHard;
  document.querySelector('#r-ath span').textContent = t.rAth;
}

function getFoodName(food) {
  const map = { zh: 'nameZh', de: 'nameDe', ja: 'nameJa', fr: 'nameFr', es: 'nameEs' };
  return food[map[currentLang]] || food.nameKey;
}

function renderFoodGrid() {
  const grid = document.getElementById('food-grid');
  grid.innerHTML = FOODS.map(f => `
    <div class="food-card">
      <span class="food-card-emoji">${f.emoji}</span>
      <div class="food-card-name">${getFoodName(f)}</div>
      <div class="food-card-prot">${f.prot}g</div>
    </div>
  `).join('');
}

function calculate() {
  const weight = parseFloat(document.getElementById('weight').value) || 70;
  const unit = document.getElementById('unit-select').value;
  const age = parseInt(document.getElementById('age').value) || 25;
  const goal = document.getElementById('goal').value;
  const gender = document.querySelector('input[name="gender"]:checked')?.value || 'male';
  const activity = parseFloat(document.querySelector('input[name="activity"]:checked')?.value || 1.2);

  const weightKg = unit === 'lbs' ? weight * 0.453592 : weight;

  // Protein multipliers (g/kg)
  const multipliers = { maintain: 1.4, build: 2.0, lose: 1.8, athlete: 2.3 };
  let mult = multipliers[goal];
  // age adjustment
  if (age > 50) mult += 0.1;
  if (gender === 'female') mult -= 0.1;
  // activity adjustment
  mult += (activity - 1.2) * 0.3;

  const proteinG = Math.round(weightKg * mult);
  const perMeal = Math.round(proteinG / 4);
  const perKg = mult.toFixed(1);
  const calories = Math.round(proteinG * 4); // 4 kcal/g

  document.getElementById('result-num').textContent = proteinG;
  document.getElementById('per-meal-val').textContent = perMeal;
  document.getElementById('per-kg-val').textContent = perKg;
  document.getElementById('calories-val').textContent = calories;

  // Breakdown bars
  const sorted = [...FOODS].sort((a,b) => b.prot - a.prot).slice(0, 6);
  const maxProt = sorted[0].prot;
  const table = document.getElementById('breakdown-table');
  table.innerHTML = sorted.map(f => {
    const portion = Math.round(proteinG / (f.prot / 100));
    const pct = (f.prot / maxProt * 100).toFixed(0);
    return `
      <div class="breakdown-row">
        <span class="breakdown-emoji">${f.emoji}</span>
        <span class="breakdown-food" style="min-width:120px">${getFoodName(f)}</span>
        <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:0%" data-w="${pct}"></div></div>
        <span class="breakdown-val">${portion}g</span>
      </div>`;
  }).join('');

  // Animate bars
  setTimeout(() => {
    table.querySelectorAll('.breakdown-bar').forEach(b => {
      b.style.width = b.dataset.w + '%';
    });
  }, 50);

  // Tip
  const t = T[currentLang];
  document.getElementById('tip-box').innerHTML = t.tip[goal] || t.tip.maintain;

  document.getElementById('result-box').classList.add('show');
  document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Radio label click handling
document.querySelectorAll('.radio-label').forEach(label => {
  label.addEventListener('click', function() {
    const name = this.querySelector('input').name;
    document.querySelectorAll(`.radio-label`).forEach(l => {
      if (l.querySelector('input')?.name === name) l.classList.remove('selected');
    });
    this.classList.add('selected');
  });
});

renderFoodGrid();
</script>
